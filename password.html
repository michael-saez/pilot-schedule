<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1c1c1e">
  <title>Michael's Schedule</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    p { font-size: 14px; color: #64748b; margin-bottom: 28px; }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #ffffff;
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="password"]:focus { border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-appearance: none;
    }
    button:active { background: #2563eb; }
    .error { margin-top: 14px; font-size: 13px; color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✈️</div>
    <h1>Michael's Schedule</h1>
    <p>Enter the password to view</p>
    <form method="POST" action="/api/auth">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password">
      <button type="submit">View Schedule</button>
      <div id="err" class="error" style="display:none">Incorrect password. Try again.</div>
    </form>
  </div>
  <script>
    if (new URLSearchParams(window.location.search).get("error")) {
      document.getElementById("err").style.display = "block";
    }
  </script>
</body>
</html>
