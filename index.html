<body>
    <div class="header">
        <h1>Michael's Schedule</h1>
        <div class="subtitle">Cargo Pilot | ANC Base</div>
        <a class="ical-link" href="webcal://michaelsaez.com/api/calendar" title="Subscribe in Calendar">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="2" width="14" height="13" rx="2"/>
                <line x1="1" y1="6" x2="15" y2="6"/>
                <line x1="5" y1="1" x2="5" y2="4"/>
                <line x1="11" y1="1" x2="11" y2="4"/>
            </svg>
            Subscribe to Calendar
        </a>
    </div>

    <div class="last-updated" id="lastUpdated">Loading...</div>
    <div id="schedule"></div>

    <script>
        // Comprehensive airport database (loaded at runtime)
        let airportCities = {};
        // IATA -> { city, tz, ups? }   tz is an IANA name like "Asia/Tokyo"
        let airportTimezones = {};

        // Load airport database
        async function loadAirportDatabase() {
            try {
                const response = await fetch('airports.json');
                if (response.ok) {
                    airportCities = await response.json();
                }
            } catch (error) {
                console.warn('Could not load airport database:', error);
            }
        }

        // Load IATA -> IANA timezone database (built from airportsdata, covers full UPS network)
        async function loadAirportTimezones() {
            try {
                const response = await fetch('airport-timezones.json');
                if (response.ok) {
                    airportTimezones = await response.json();
                }
            } catch (error) {
                console.warn('Could not load airport timezone database:', error);
            }
        }

        function getCityName(code) {
            // Use the comprehensive database, fallback to code if not found
            return airportCities[code] || code;
        }

        function getTimeZone(code) {
            // Returns IANA tz name (e.g. "Asia/Tokyo") or null if unknown.
            return (airportTimezones[code] && airportTimezones[code].tz) || null;
        }

        // Convert a UTC date+time stored as MM/DD/YY HH:MM (Z) into the local
        // wall-clock date+time at the airport with IATA code `iata`.
        // Returns { date: "MM/DD/YY", time: "HH:MM" } or null if tz is unknown.
        //
        // This is the core fix for the dateline / DST / midnight-rollover bugs:
        // we never do offset arithmetic by hand. We construct an absolute UTC
        // instant, then ask Intl.DateTimeFormat (i.e. the OS's tzdata) where
        // that instant points on the wall clock in the airport's IANA zone.
        function utcToLocal(dateMmddyy, timeHhmm, iata) {
            const tz = getTimeZone(iata);
            if (!tz || !dateMmddyy || !timeHhmm) return null;
            const [m, d, y] = dateMmddyy.split('/').map(s => parseInt(s, 10));
            const [hh, mm] = timeHhmm.split(':').map(s => parseInt(s, 10));
            // Build an absolute UTC instant. Date.UTC is the only safe way.
            const utcMs = Date.UTC(2000 + y, m - 1, d, hh, mm, 0);
            const instant = new Date(utcMs);
            if (isNaN(instant.getTime())) return null;
            const fmt = new Intl.DateTimeFormat('en-US', {
                timeZone: tz,
                year: '2-digit', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', hour12: false,
            });
            const parts = {};
            for (const p of fmt.formatToParts(instant)) parts[p.type] = p.value;
            // Intl returns "24" for midnight under hour12:false — normalize to "00".
            if (parts.hour === '24') parts.hour = '00';
            return {
                date: `${parts.month}/${parts.day}/${parts.year}`,
                time: `${parts.hour}:${parts.minute}`,
            };
        }

        // Walk every event, compute display LT from UTC + tz, attach to the
        // event, and collect any mismatches with stored LT. Mismatches mean
        // the JSON was written with bad offset math somewhere upstream — we
        // surface them but DO NOT fail; we just prefer the computed value.
        function annotateDisplayTimes(data) {
            const driftIssues = [];
            const recordDrift = (label, side, stored, computed) => {
                driftIssues.push(`${label} ${side}: stored ${stored.date} ${stored.time} → computed ${computed.date} ${computed.time}`);
            };

            for (const trip of data.trips || []) {
                for (const ev of trip.events || []) {
                    let originIata = null, destIata = null;
                    if (ev.type === 'flight') {
                        const parts = (ev.route || '').split('-');
                        if (parts.length === 2) { originIata = parts[0]; destIata = parts[1]; }
                    } else if (ev.type === 'layover') {
                        originIata = destIata = ev.city;
                    }

                    const startCalc = utcToLocal(ev.startDateUTC, ev.startTimeUTC, originIata);
                    const endCalc   = utcToLocal(ev.endDateUTC,   ev.endTimeUTC,   destIata);

                    // Prefer computed; fall back to stored when tz is unknown.
                    ev._dispStartDateLT = (startCalc && startCalc.date) || ev.startDateLT;
                    ev._dispStartTimeLT = (startCalc && startCalc.time) || ev.startTimeLT;
                    ev._dispEndDateLT   = (endCalc   && endCalc.date)   || ev.endDateLT;
                    ev._dispEndTimeLT   = (endCalc   && endCalc.time)   || ev.endTimeLT;

                    const label = ev.type === 'flight'
                        ? `${trip.tripId} ${ev.flightNumber || ''} ${ev.route || ''}`.trim()
                        : `${trip.tripId} layover ${ev.city || ''}`.trim();
                    if (startCalc && (startCalc.date !== ev.startDateLT || startCalc.time !== ev.startTimeLT)) {
                        recordDrift(label, 'start',
                            { date: ev.startDateLT, time: ev.startTimeLT },
                            startCalc);
                    }
                    if (endCalc && (endCalc.date !== ev.endDateLT || endCalc.time !== ev.endTimeLT)) {
                        recordDrift(label, 'end',
                            { date: ev.endDateLT, time: ev.endTimeLT },
                            endCalc);
                    }
                }
            }
            return driftIssues;
        }

        async function loadSchedule() {
            try {
                const response = await fetch('schedule-complete.json');
                if (!response.ok) throw new Error('Failed to load schedule');
                const data = await response.json();
                renderSchedule(data);
            } catch (error) {
                console.error('Error loading schedule:', error);
                document.getElementById('schedule').innerHTML =
                    '<div class="error">Error loading schedule. Please refresh the page.</div>';
            }
        }

        function parseMMDDYY(dateStr) {
            // Parse dates like "03/31/26" into Date objects
            const parts = dateStr.split('/');
            const month = parseInt(parts[0], 10) - 1; // JS months are 0-indexed
            const day = parseInt(parts[1], 10);
            const year = parseInt(parts[2], 10) + 2000; // "26" becomes 2026
            return new Date(year, month, day);
        }

        function validateChronology(allEvents) {
            const issues = [];
            // Validate all events with UTC times (flights and layovers)
            const eventsWithUTC = allEvents.filter(e => e.dateUTC && e.timeUTC);

            for (let i = 1; i < eventsWithUTC.length; i++) {
                const prevUtc = eventsWithUTC[i-1].dateUTC + 'T' + eventsWithUTC[i-1].timeUTC;
                const currUtc = eventsWithUTC[i].dateUTC + 'T' + eventsWithUTC[i].timeUTC;
                if (currUtc < prevUtc) {
                    const prevName = eventsWithUTC[i-1].event.flightNumber || eventsWithUTC[i-1].event.city || 'Event';
                    const currName = eventsWithUTC[i].event.flightNumber || eventsWithUTC[i].event.city || 'Event';
                    issues.push(`${currName} (${currUtc}Z) is before ${prevName} (${prevUtc}Z)`);
                }
            }
            return issues;
        }

        function renderSchedule(data) {
            const scheduleDiv = document.getElementById('schedule');
            const lastUpdatedDiv = document.getElementById('lastUpdated');
            const lastUpdated = new Date().toISOString().split('T')[0];
            lastUpdatedDiv.textContent = `Updated ${lastUpdated}`;

            const now = new Date();
            const today = now.getFullYear() + '-' +
                         String(now.getMonth() + 1).padStart(2, '0') + '-' +
                         String(now.getDate()).padStart(2, '0');

            // Compute display-time LT from UTC + airport IANA tz (the core fix).
            // After this, events carry _dispStartDateLT / _dispStartTimeLT /
            // _dispEndDateLT / _dispEndTimeLT — those are what we render.
            const driftIssues = annotateDisplayTimes(data);
            if (driftIssues.length > 0) {
                console.warn(`[tz-drift] ${driftIssues.length} event(s) had stored LT that disagrees with UTC+tz. Showing computed values.`);
                driftIssues.forEach(m => console.warn(`  ${m}`));

            }

            // Collect all events (using computed display LT, falling back to stored)
            const allEvents = [];
            data.trips.forEach(trip => {
                trip.events.forEach(event => {
                    allEvents.push({
                        dateLocal: event._dispStartDateLT || event.startDateLT,
                        timeLocal: event._dispStartTimeLT || event.startTimeLT,
                        dateUTC: event.startDateUTC || '',
                        timeUTC: event.startTimeUTC || '',
                        endDateUTC: event.endDateUTC || '',
                        endTimeUTC: event.endTimeUTC || '',
                        event: event,
                        trip: trip
                    });
                });
            });

            // Sort by UTC times (source of truth)
            allEvents.sort((a, b) => {
                if (!a.dateUTC || !b.dateUTC) return 0;
                const aUtc = a.dateUTC + 'T' + a.timeUTC;
                const bUtc = b.dateUTC + 'T' + b.timeUTC;
                return aUtc.localeCompare(bUtc);
            });

            // Validate chronological order
            const chronoIssues = validateChronology(allEvents);
            if (chronoIssues.length > 0) {
                console.error('Chronology validation failed:', chronoIssues);
            }

            // ── Archive all past events except the most recent one ──────────
            const nowUtcStr = now.toISOString().slice(0, 10) + 'T' +
                String(now.getUTCHours()).padStart(2, '0') + ':' +
                String(now.getUTCMinutes()).padStart(2, '0');

            function isFullyPast(item) {
                if (!item.endDateUTC || !item.endTimeUTC) return false;
                const d = parseMMDDYY(item.endDateUTC);
                const endISO = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' +
                               String(d.getDate()).padStart(2,'0') + 'T' + item.endTimeUTC;
                return endISO < nowUtcStr;
            }

            const pastItems     = allEvents.filter(isFullyPast);
            const upcomingItems = allEvents.filter(e => !isFullyPast(e));
            const archivedItems = pastItems.slice(0, -1);
            const visibleItems  = [...pastItems.slice(-1), ...upcomingItems];

            // ── Build a single event's HTML ───────────────────────────────────
            function buildEventHTML(item) {
                const event = item.event;
                const dateObj = parseMMDDYY(item.dateLocal);
                const dateComparable = dateObj.getFullYear() + '-' +
                    String(dateObj.getMonth()+1).padStart(2,'0') + '-' +
                    String(dateObj.getDate()).padStart(2,'0');
                let isCurrent = false;
                if (item.dateUTC && item.timeUTC && event.endDateUTC && event.endTimeUTC) {
                    const sd = parseMMDDYY(item.dateUTC), ed = parseMMDDYY(event.endDateUTC);
                    const sISO = sd.getFullYear()+'-'+String(sd.getMonth()+1).padStart(2,'0')+'-'+String(sd.getDate()).padStart(2,'0');
                    const eISO = ed.getFullYear()+'-'+String(ed.getMonth()+1).padStart(2,'0')+'-'+String(ed.getDate()).padStart(2,'0');
                    isCurrent = (nowUtcStr >= sISO+'T'+item.timeUTC && nowUtcStr <= eISO+'T'+event.endTimeUTC);
                }
                const isPast = (dateComparable < today) && !isCurrent;
                const pastClass = isPast ? 'past' : '';

                if (event.type === 'flight') {
                    let icon = '✈️', iconClass = 'flight';
                    if (event.position === 'DH') { icon = '😴'; iconClass = 'deadhead'; }
                    if (event.position === 'JS') { icon = '🪑'; iconClass = 'jumpseat'; }
                    if (event.position === 'DH' && event.flightNumber && !event.flightNumber.startsWith('UPS')) { icon = '🍸'; iconClass = 'commercial'; }
                    const subtitle = `${event.flightNumber} | ${event.position}` + (event.blockHours ? ` | ${event.blockHours}` : '');
                    const dispEndDateLT = event._dispEndDateLT || event.endDateLT;
                    const dispEndTimeLT = event._dispEndTimeLT || event.endTimeLT;
                    const startDisplay = parseMMDDYY(item.dateLocal).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    const endDisplay   = parseMMDDYY(dispEndDateLT).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    const localTimeDisplay = `${startDisplay} ${item.timeLocal}<br/>→ ${endDisplay} ${dispEndTimeLT}`;
                    const utcTimeDisplay   = item.dateUTC ? `${item.dateUTC} ${item.timeUTC}Z<br/>→ ${item.endDateUTC} ${item.endTimeUTC}Z` : '(pending)';
                    const routeParts = event.route.split('-');
                    const cityRoute  = routeParts.length === 2 ? `${getCityName(routeParts[0])} → ${getCityName(routeParts[1])}` : event.route;
                    return `<div class="event ${pastClass}" data-date="${item.dateLocal}">
                        <div class="event-icon ${iconClass}">${icon}</div>
                        <div class="event-details">
                            <div class="event-title">${cityRoute}</div>
                            <div class="event-subtitle">${subtitle}</div>
                        </div>
                        <div class="event-times">
                            <div class="time-column"><div class="time-label">Local</div>${localTimeDisplay}</div>
                            <div class="time-column utc"><div class="time-label">UTC</div>${utcTimeDisplay}</div>
                        </div>
                    </div>`;
                } else if (event.type === 'layover') {
                    const layoverCity    = getCityName(event.city);
                    const dispStartDateLT = event._dispStartDateLT || event.startDateLT;
                    const dispStartTimeLT = event._dispStartTimeLT || event.startTimeLT;
                    const dispEndDateLT   = event._dispEndDateLT   || event.endDateLT;
                    const dispEndTimeLT   = event._dispEndTimeLT   || event.endTimeLT;
                    const startDisplay = parseMMDDYY(dispStartDateLT).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    const endDisplay   = parseMMDDYY(dispEndDateLT).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    const layoverTimeDisplay = `${startDisplay} ${dispStartTimeLT}<br/>→ ${endDisplay} ${dispEndTimeLT}<br/><strong>Rest: ${event.restHours || 'TBD'}</strong>`;
                    return `<div class="event ${pastClass}" data-date="${item.dateLocal}">
                        <div class="event-icon layover">🛏️</div>
                        <div class="event-details">
                            <div class="event-title">Layover in ${layoverCity}</div>
                            <div class="event-subtitle">${event.hotel}</div>
                        </div>
                        <div class="event-times">
                            <div class="time-column"><div class="time-label">Local</div>${layoverTimeDisplay}</div>
                            <div class="time-column utc"><div class="time-label">UTC</div>${event.startDateUTC} ${event.startTimeUTC}Z<br/>→ ${event.endDateUTC} ${event.endTimeUTC}Z</div>
                        </div>
                    </div>`;
                }
                return '';
            }

            // ── Render a list of items grouped by local date ──────────────────
            function renderItems(items) {
                const byDate = {};
                items.forEach(item => {
                    if (!byDate[item.dateLocal]) byDate[item.dateLocal] = [];
                    byDate[item.dateLocal].push(item);
                });
                return Object.keys(byDate).sort().map(dateStr => {
                    const date    = parseMMDDYY(dateStr);
                    const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                    const monthDay = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    return `<div class="day-header">${dayName} ${monthDay} ${date.getFullYear()}</div>` +
                           byDate[dateStr].map(buildEventHTML).join('');
                }).join('');
            }

            // ── Assemble and inject ───────────────────────────────────────────
            let scheduleHTML = '';
            if (archivedItems.length > 0) {
                const n = archivedItems.length;
                const showLabel = `Show ${n} older event${n === 1 ? '' : 's'}`;
                scheduleHTML += `
                    <div style="text-align:center;padding:14px 20px 6px">
                        <button id="archive-toggle" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid #334155;border-radius:20px;background:transparent;color:#64748b;font-size:12px;font-weight:500;letter-spacing:0.02em;cursor:pointer;transition:border-color 0.2s,color 0.2s;">
                            <svg id="archive-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;transition:transform 0.2s"><polyline points="2 5 8 11 14 5"/></svg>
                            <span id="archive-label">${showLabel}</span>
                        </button>
                    </div>
                    <div id="archived-section" style="display:none">${renderItems(archivedItems)}</div>`;
            }
            scheduleHTML += renderItems(visibleItems);
            scheduleDiv.innerHTML = scheduleHTML;

            if (archivedItems.length > 0) {
                const n = archivedItems.length;
                const showLabel = `Show ${n} older event${n === 1 ? '' : 's'}`;
                document.getElementById('archive-toggle').addEventListener('click', function () {
                    const section  = document.getElementById('archived-section');
                    const label    = document.getElementById('archive-label');
                    const chevron  = document.getElementById('archive-chevron');
                    const isOpen   = section.style.display !== 'none';
                    section.style.display         = isOpen ? 'none' : 'block';
                    label.textContent             = isOpen ? showLabel : 'Hide older events';
                    chevron.style.transform        = isOpen ? '' : 'rotate(180deg)';
                    this.style.borderColor         = isOpen ? '' : '#60a5fa';
                    this.style.color               = isOpen ? '' : '#93c5fd';
                });
            }

            // Auto-scroll to next upcoming event
            scrollToNextEvent();
        }

        function scrollToNextEvent() {
            const now = new Date();
            const currentUTC = now.getFullYear() + '-' +
                             String(now.getMonth() + 1).padStart(2, '0') + '-' +
                             String(now.getDate()).padStart(2, '0') + 'T' +
                             String(now.getHours()).padStart(2, '0') + ':' +
                             String(now.getMinutes()).padStart(2, '0');

            // Find first future event
            const events = document.querySelectorAll('[data-date]');
            let nextEventElement = null;

            for (let event of events) {
                const eventDateStr = event.getAttribute('data-date');
                const eventDate = parseMMDDYY(eventDateStr);

                // If event date is today or in future, this is our next event
                if (eventDate >= new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                    nextEventElement = event;
                    break;
                }
            }

            // Scroll to next event if found
            if (nextEventElement) {
                // Highlight the next event
                nextEventElement.style.backgroundColor = '#1e293b';
                nextEventElement.style.borderLeft = '4px solid #60a5fa';
                nextEventElement.style.paddingLeft = '16px';

                // Scroll into view
                nextEventElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Load airport city + IANA-tz databases in parallel, then load schedule
        Promise.all([loadAirportDatabase(), loadAirportTimezones()]).then(() => loadSchedule());
    </script>
