<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1c1c1e">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Michael's Schedule</title>
    <script>
        if (window.navigator.standalone) {
            window.addEventListener('pageshow', function(event) {
                if (event.persisted) window.location.reload();
            });
        }
        setInterval(function() {
            if (!document.hidden) window.location.reload(true);
        }, 300000);
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #ffffff;
            line-height: 1.4;
        }
        .header {
            background: #1e293b;
            padding: 20px;
            padding-top: 50px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .header .subtitle { font-size: 13px; color: #94a3b8; }
        .last-updated { text-align: center; padding: 10px; font-size: 11px; color: #64748b; }
        .day-header {
            background: #0f172a;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #60a5fa;
            border-bottom: 1px solid #1e293b;
        }
        .event {
            background: #1e293b;
            display: grid;
            grid-template-columns: 36px 1fr auto;
            gap: 14px;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #334155;
        }
        .event-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            background: transparent;
            border: 2px solid #64748b;
            color: #94a3b8;
        }
        .event-icon.flight { border-color: #3b82f6; color: #3b82f6; }
        .event-icon.layover { border-color: #8b5cf6; color: #8b5cf6; }
        .event-icon.jumpseat { border-color: #f59e0b; color: #f59e0b; }
        .event-icon.deadhead { border-color: #475569; color: #64748b; }
        .event-details { }
        .event-title { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .event-subtitle { font-size: 13px; color: #94a3b8; }
        .event-times {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 20px;
            text-align: right;
            font-size: 13px;
        }
        .time-column {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .time-column.utc { 
            border-left: 1px solid #334155;
            padding-left: 20px;
            color: #10b981;
            font-weight: 500;
        }
        .time-label {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .event.past {
            opacity: 0.45;
            filter: grayscale(0.6);
        }
        .event.past .event-title {
            color: #64748b;
        }
        .event.past .event-subtitle {
            color: #475569;
        }
        .event.past .event-icon {
            border-color: #475569;
            color: #64748b;
        }
        .footer { text-align: center; padding: 30px 20px; font-size: 12px; color: #64748b; }
        .loading { text-align: center; padding: 40px 20px; }
        .error { text-align: center; padding: 40px 20px; color: #ef4444; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Michael's Schedule</h1>
        <div class="subtitle">Cargo Pilot | ANC Base</div>
    </div>

    <div class="last-updated" id="lastUpdated">Loading...</div>
    <div id="schedule"></div>

    <script>
        async function loadSchedule() {
            try {
                const response = await fetch('schedule-complete.json');
                if (!response.ok) throw new Error('Failed to load schedule');
                const data = await response.json();
                renderSchedule(data);
            } catch (error) {
                console.error('Error loading schedule:', error);
                document.getElementById('schedule').innerHTML =
                    '<div class="error">Error loading schedule. Please refresh the page.</div>';
            }
        }

        function renderSchedule(data) {
            const scheduleDiv = document.getElementById('schedule');
            const lastUpdatedDiv = document.getElementById('lastUpdated');
            const lastUpdated = new Date().toISOString().split('T')[0];
            lastUpdatedDiv.textContent = `Updated ${lastUpdated}`;

            const now = new Date();
            const today = now.getFullYear() + '-' +
                         String(now.getMonth() + 1).padStart(2, '0') + '-' +
                         String(now.getDate()).padStart(2, '0');

            // Collect all events
            const allEvents = [];
            data.trips.forEach(trip => {
                trip.events.forEach(event => {
                    allEvents.push({
                        dateLocal: event.startDateLT,
                        timeLocal: event.startTimeLT,
                        dateUTC: event.startDateUTC || '',
                        timeUTC: event.startTimeUTC || '',
                        endDateUTC: event.endDateUTC || '',
                        endTimeUTC: event.endTimeUTC || '',
                        event: event,
                        trip: trip
                    });
                });
            });

            // Sort by UTC times (source of truth)
            allEvents.sort((a, b) => {
                if (!a.dateUTC || !b.dateUTC) return 0;
                const aUtc = a.dateUTC + 'T' + a.timeUTC;
                const bUtc = b.dateUTC + 'T' + b.timeUTC;
                return aUtc.localeCompare(bUtc);
            });

            // Group by LOCAL date for display
            const eventsByDate = {};
            allEvents.forEach(item => {
                const date = item.dateLocal;
                if (!eventsByDate[date]) eventsByDate[date] = [];
                eventsByDate[date].push(item);
            });

            // Render
            Object.keys(eventsByDate).sort().forEach(dateStr => {
                const date = new Date(dateStr + 'T00:00:00');
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const monthDay = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const year = date.getFullYear();
                scheduleDiv.innerHTML += `<div class="day-header">${dayName} ${monthDay} ${year}</div>`;

                eventsByDate[dateStr].forEach(item => {
                    const event = item.event;
                    const isPast = dateStr < today;
                    const pastClass = isPast ? 'past' : '';
                    let eventHTML = '';

                    if (event.type === 'flight') {
                        let icon = '✈️';
                        if (event.position === 'DH') icon = '😴';
                        if (event.position === 'JS') icon = '🪑';

                        let subtitle = `${event.flightNumber} | ${event.position}`;
                        if (event.blockHours) subtitle += ` | ${event.blockHours}`;

                        // Format local dates
                        const startDate = new Date(item.dateLocal + 'T00:00:00');
                        const endDate = new Date(event.endDateLT + 'T00:00:00');
                        const startDisplay = startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        const endDisplay = endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        const spansMultipleDays = item.dateLocal !== event.endDateLT;

                        let localTimeDisplay = spansMultipleDays 
                            ? `${startDisplay} ${item.timeLocal} → ${endDisplay} ${event.endTimeLT}`
                            : `${item.timeLocal} → ${event.endTimeLT}`;

                        let utcTimeDisplay = item.dateUTC 
                            ? `${item.dateUTC} ${item.timeUTC}Z<br/>→ ${item.endDateUTC} ${item.endTimeUTC}Z`
                            : '(pending)';

                        eventHTML = `
                            <div class="event ${pastClass}" data-date="${item.dateLocal}">
                                <div class="event-icon flight">${icon}</div>
                                <div class="event-details">
                                    <div class="event-title">${event.route}</div>
                                    <div class="event-subtitle">${subtitle}</div>
                                </div>
                                <div class="event-times">
                                    <div class="time-column">
                                        <div class="time-label">Local</div>
                                        ${localTimeDisplay}
                                    </div>
                                    <div class="time-column utc">
                                        <div class="time-label">UTC</div>
                                        ${utcTimeDisplay}
                                    </div>
                                </div>
                            </div>
                        `;
                    } else if (event.type === 'layover') {
                        eventHTML = `
                            <div class="event ${pastClass}" data-date="${item.dateLocal}">
                                <div class="event-icon layover">🛏️</div>
                                <div class="event-details">
                                    <div class="event-title">Layover at ${event.city}</div>
                                    <div class="event-subtitle">${event.hotel}</div>
                                </div>
                                <div class="event-times">
                                    <div class="time-column">
                                        <div class="time-label">Duration</div>
                                        ${event.duration}
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    scheduleDiv.innerHTML += eventHTML;
                });
            });
        }

        loadSchedule();
    </script>

    <div class="footer">
        Auto-updated schedule 🤖<br/>Powered by Claude
    </div>
</body>
</html>
