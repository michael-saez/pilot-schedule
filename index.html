<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1c1c1e">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Refresh Michael's Schedule</title>
    <script>
        if (window.navigator.standalone) {
            window.addEventListener('pageshow', function(event) {
                if (event.persisted) window.location.reload();
            });
        }
        setInterval(function() {
            if (!document.hidden) window.location.reload(true);
        }, 300000);
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #ffffff;
            line-height: 1.4;
        }
        .header {
            background: #1e293b;
            padding: 20px;
            padding-top: 50px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .header .subtitle { font-size: 13px; color: #94a3b8; }
        .last-updated { text-align: center; padding: 10px; font-size: 11px; color: #64748b; }
        .day-header {
            background: #0f172a;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #60a5fa;
            border-bottom: 1px solid #1e293b;
        }
        .event {
            background: #1e293b;
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #334155;
        }
        .event-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 14px;
            flex-shrink: 0;
            background: transparent;
            border: 2px solid #64748b;
            color: #94a3b8;
        }
        .event-icon.flight { border-color: #3b82f6; color: #3b82f6; }
        .event-icon.layover { border-color: #8b5cf6; color: #8b5cf6; }
        .event-icon.jumpseat { border-color: #f59e0b; color: #f59e0b; }
        .event-icon.deadhead { border-color: #475569; color: #64748b; }
        .event-details { flex: 1; }
        .event-title { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .event-subtitle { font-size: 13px; color: #94a3b8; }
        .event-time { text-align: right; font-size: 15px; font-weight: 500; }
        .event-time .local-date {
            font-size: 11px;
            color: #60a5fa;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .event-time .day-change {
            font-size: 11px;
            color: #475569;
            font-weight: 500;
            margin: 4px 0;
        }
        .event-time .timezone {
            font-size: 11px;
            color: #64748b;
            font-weight: 400;
            margin-top: 2px;
        }
        .event.past {
            opacity: 0.45;
            filter: grayscale(0.6);
        }
        .event.past .event-title {
            color: #64748b;
        }
        .event.past .event-subtitle {
            color: #475569;
        }
        .event.past .event-icon {
            border-color: #475569;
            color: #64748b;
        }
        .footer { text-align: center; padding: 30px 20px; font-size: 12px; color: #64748b; }
        .loading { text-align: center; padding: 40px 20px; }
        .error { text-align: center; padding: 40px 20px; color: #ef4444; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Michael's Schedule</h1>
        <div class="subtitle">Cargo Pilot | ANC Base</div>
    </div>

    <div class="last-updated" id="lastUpdated">Loading...</div>
    <div id="schedule"></div>

    <script>
        async function loadSchedule() {
            try {
                const response = await fetch('schedule-complete.json');
                if (!response.ok) throw new Error('Failed to load schedule');

                const data = await response.json();
                renderSchedule(data);
            } catch (error) {
                console.error('Error loading schedule:', error);
                document.getElementById('schedule').innerHTML =
                    '<div class="error">Error loading schedule. Please refresh the page.</div>';
            }
        }

        function renderSchedule(data) {
            const scheduleDiv = document.getElementById('schedule');
            const lastUpdatedDiv = document.getElementById('lastUpdated');

            const lastUpdated 2026-03-31 01:08:48
            lastUpdatedDiv.textContent = `Updated 2026-03-31 01:08:48

            const now = new Date();
            const today = now.getFullYear() + '-' +
                         String(now.getMonth() + 1).padStart(2, '0') + '-' +
                         String(now.getDate()).padStart(2, '0');

            // Collect all events with their dates
            const allEvents = [];
            data.trips.forEach(trip => {
                trip.events.forEach(event => {
                    const dateToUse = event.startDateLT;
                    allEvents.push({
                        date: dateToUse,
                        time: event.startTimeLT,
                        event: event,
                        trip: trip
                    });
                });
            });

            // Sort by date AND time for proper chronological order
            allEvents.sort((a, b) => {
                const dateCompare = a.date.localeCompare(b.date);
                if (dateCompare !== 0) return dateCompare;
                // Same date, sort by time
                return a.time.localeCompare(b.time);
            });

            // Group by date
            const eventsByDate = {};
            allEvents.forEach(item => {
                if (!eventsByDate[item.date]) {
                    eventsByDate[item.date] = [];
                }
                eventsByDate[item.date].push(item);
            });

            // Render each date
            Object.keys(eventsByDate).sort().forEach(dateStr => {
                const date = new Date(dateStr + 'T00:00:00Z');
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const monthDay = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const year = date.getFullYear();

                scheduleDiv.innerHTML += `<div class="day-header" data-date="${dateStr}">${dayName} ${monthDay} ${year}</div>`;

                eventsByDate[dateStr].forEach(item => {
                    const event = item.event;
                    const isPast = dateStr < today;
                    const pastClass = isPast ? 'past' : '';

                    let eventHTML = '';

                    if (event.type === 'flight') {
                        let icon = '✈️';
                        let iconClass = 'flight';
                        if (event.position === 'DH') {
                            icon = '😴';
                            iconClass = 'deadhead';
                        } else if (event.position === 'JS') {
                            icon = '🪑';
                            iconClass = 'jumpseat';
                        }
                        const dateObj = new Date(event.startDateLT + 'T00:00:00Z');
                        const displayDate = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

                        let subtitle = `${event.flightNumber} | ${event.position}`;
                        if (event.blockHours) {
                            subtitle += ` | ${event.blockHours}`;
                        }

                        // Format start and end dates/times
                        const startDate = new Date(event.startDateLT + 'T00:00:00Z');
                        const endDate = new Date(event.endDateLT + 'T00:00:00Z');
                        const startDisplay = startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        const endDisplay = endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        const spansMultipleDays = event.startDateLT !== event.endDateLT;

                        let timeDisplay = '';
                        if (spansMultipleDays) {
                            timeDisplay = `${startDisplay} ${event.startTimeLT} → ${endDisplay} ${event.endTimeLT}`;
                        } else {
                            timeDisplay = `${event.startTimeLT} → ${event.endTimeLT}`;
                        }

                        eventHTML = `
                            <div class="event ${pastClass}" data-date="${event.startDateLT}">
                                <div class="event-icon ${iconClass}">${icon}</div>
                                <div class="event-details">
                                    <div class="event-title">${event.route}</div>
                                    <div class="event-subtitle">${subtitle}</div>
                                </div>
                                <div class="event-time">
                                    <div class="local-date">${displayDate}</div>
                                    ${timeDisplay}
                                </div>
                            </div>
                        `;
                    } else if (event.type === 'layover') {
                        const dateObj = new Date(event.startDateLT + 'T00:00:00Z');
                        const displayDate = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

                        eventHTML = `
                            <div class="event ${pastClass}" data-date="${event.startDateLT}">
                                <div class="event-icon layover">🛏️</div>
                                <div class="event-details">
                                    <div class="event-title">Layover at ${event.city}</div>
                                    <div class="event-subtitle">${event.hotel}</div>
                                </div>
                                <div class="event-time">
                                    <div class="local-date">${displayDate}</div>
                                    ${event.duration}
                                </div>
                            </div>
                        `;
                    }

                    scheduleDiv.innerHTML += eventHTML;
                });
            });

            // Auto-scroll logic
            const allEventElements = document.querySelectorAll('.event');
            let pastCount = 0;
            let scrollTarget = null;
            let firstFutureIndex = -1;

            for (let i = 0; i < allEventElements.length; i++) {
                const eventDate = allEventElements[i].getAttribute('data-date');
                if (eventDate && eventDate < today) {
                    pastCount++;
                } else if (eventDate && eventDate >= today && firstFutureIndex === -1) {
                    firstFutureIndex = i;
                    break;
                }
            }

            if (firstFutureIndex > 0) {
                const targetIndex = Math.max(0, firstFutureIndex - 2);
                scrollTarget = allEventElements[targetIndex];
            }

            if (scrollTarget) {
                const headerOffset = 140;
                const elementPosition = scrollTarget.getBoundingClientRect().top + window.pageYOffset;
                const offsetPosition = elementPosition - headerOffset;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'auto'
                });
            }
        }

        loadSchedule();
    </script>

    <div class="footer">
        Auto-updated schedule 🤖<br>
        Powered by Claude
    </div>
</body>
</html>
